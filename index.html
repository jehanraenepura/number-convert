<!doctype html>
<html lang="si">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>A/L ICT — Number & Unicode Converter</title>

<style>
:root{
  --bg:#f6f8fb;
  --card:#ffffff;
  --accent1:#6C63FF;
  --accent2:#00b4ff;
  --text:#111;
  --muted:#6b7280;
}

html,body{
  margin:0;
  font-family:Inter,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
}

/* container */
.wrap{
  max-width:950px;
  margin:auto;
  padding:25px 16px;
}

/* card */
.card{
  background:var(--card);
  border-radius:18px;
  padding:22px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
  backdrop-filter:blur(10px);
}

/* header */
h1{
  text-align:center;
  font-size:26px;
  margin-bottom:10px;
}

.lead{
  text-align:center;
  color:var(--muted);
  margin-bottom:22px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}
@media(max-width:780px){
  .grid{grid-template-columns:1fr}
}

/* inputs */
label{
  font-size:13px;
  color:var(--muted);
}

input,select{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:1px solid #e6e9ef;
  margin-top:6px;
  font-size:14px;
}

/* output box */
.output{
  background:#f1f5ff;
  padding:14px;
  border-radius:12px;
  border:1px dashed #dbe4ff;
  min-height:120px;
  font-family:monospace;
  white-space:pre-wrap;
}

/* buttons */
.actions{
  display:flex;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

button{
  border:0;
  padding:11px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  color:white;
  background:linear-gradient(45deg,var(--accent1),var(--accent2));
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:.3s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 22px rgba(0,0,0,0.2);
}

.secondary{
  background:#eef2ff;
  color:#4f46e5;
}

/* social icons */
.social-bar{
  display:flex;
  justify-content:center;
  gap:22px;
  margin-top:30px;
}

.social-icon{
  width:54px;height:54px;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  background:#f1f5f9;
  color:#555;
  transition:.3s;
  animation:floatIcon 3s ease-in-out infinite;
}

.youtube:hover{background:#ff0000;color:white}
.facebook:hover{background:#1877F2;color:white}
.tiktok:hover{background:#000;color:white}
.instagram:hover{background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);color:white}
.telegram:hover{background:#0088cc;color:white}

@keyframes floatIcon{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* footer */
.footer{
  text-align:center;
  margin-top:28px;
  color:#9aa0aa;
  font-size:14px;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<h1>Number & Unicode Converter</h1>
<p class="lead">Binary • Decimal • Hex • Unicode converter tool</p>

<div class="grid">
<div>
<label>Mode</label>
<select id="mode">
<option value="base">Number Base Converter</option>
<option value="text-to-cp">Text → Unicode</option>
<option value="cp-to-text">Unicode → Text</option>
</select>

<div id="base-options">
<label>From Base</label>
<select id="fromBase">
<option value="2">Binary</option>
<option value="8">Octal</option>
<option value="10" selected>Decimal</option>
<option value="16">Hex</option>
</select>

<label>To Base</label>
<select id="toBase">
<option value="2">Binary</option>
<option value="8">Octal</option>
<option value="10" selected>Decimal</option>
<option value="16">Hex</option>
</select>
</div>

<label>Input</label>
<input id="inputValue" placeholder="Enter value">

<div class="actions">
<button id="convertBtn">Convert</button>
<button class="secondary" id="clearBtn">Clear</button>
<button class="secondary" id="copyOut">Copy</button>
</div>
</div>

<div>
<label>Output</label>
<div id="output" class="output"></div>
</div>
</div>

<!-- social -->
<div class="social-bar">
<a href="https://youtube.com/@jehanranepura" target="_blank" class="social-icon youtube"><i class="fab fa-youtube"></i></a>
<a href="https://facebook.com" target="_blank" class="social-icon facebook"><i class="fab fa-facebook-f"></i></a>
<a href="https://tiktok.com" target="_blank" class="social-icon tiktok"><i class="fab fa-tiktok"></i></a>
<a href="https://instagram.com/jehanranepura" target="_blank" class="social-icon instagram"><i class="fab fa-instagram"></i></a>
<a href="https://t.me/jehan_rp" target="_blank" class="social-icon telegram"><i class="fab fa-telegram-plane"></i></a>
</div>

<div class="footer">Created by Jehan Ranepura</div>

</div>
</div>

<script>
    // Utility helpers
    const el = id => document.getElementById(id);
    const mode = el('mode');
    const fromBase = el('fromBase');
    const toBase = el('toBase');
    const inputValue = el('inputValue');
    const output = el('output');
    const convertBtn = el('convertBtn');
    const clearBtn = el('clearBtn');
    const copyOut = el('copyOut');
    const baseOptions = el('base-options');

    function normalizeStr(s){return s.trim();}

    function convertNumberBetweenBases(str, from, to){
      // allow spaces or commas, convert each token
      const tokens = str.split(/[\s,]+/).filter(Boolean);
      if(tokens.length===0) return '';
      const results = tokens.map(tok=>{
        // handle optional 0x or 0b
        let t = tok.replace(/^0x/i,'').replace(/^0b/i,'');
        try{
          const dec = parseInt(t, parseInt(from));
          if(Number.isNaN(dec)) throw new Error('invalid');
          if(to==16) return dec.toString(16).toUpperCase();
          return dec.toString(parseInt(to));
        }catch(e){
          return `[invalid:${tok}]`;
        }
      });
      return results.join(' ');
    }

    function textToCodePoints(s){
      const points = [];
      for (const ch of s) {
        const cp = ch.codePointAt(0).toString(16).toUpperCase();
        points.push('U+' + cp.padStart(4,'0'));
      }
      return points.join(' ');
    }

    function codePointsToText(s){
      // Accept forms: U+0DB1, 0DB1, 0x0DB1, decimal numbers
      const tokens = s.split(/[\s,]+/).filter(Boolean);
      const chars = tokens.map(tok=>{
        let t = tok.toUpperCase().replace(/^U\+/,'').replace(/^0X/,'');
        // if decimal number
        if(/^\d+$/.test(t)){
          const n = parseInt(t,10);
          return String.fromCodePoint(n);
        }
        // hex
        const n = parseInt(t,16);
        if(Number.isNaN(n)) return `�`;
        return String.fromCodePoint(n);
      });
      return chars.join('');
    }

    function runConversion(){
      const m = mode.value;
      const raw = normalizeStr(inputValue.value);
      if(!raw){ output.textContent = 'Input හි කිසිඳු අගයක් නැත.'; return; }

      if(m==='base'){
        const res = convertNumberBetweenBases(raw, fromBase.value, toBase.value);
        output.textContent = res;
      }else if(m==='text-to-cp'){
        const res = textToCodePoints(raw);
        output.textContent = res;
      }else if(m==='cp-to-text'){
        const res = codePointsToText(raw);
        output.textContent = res;
      }
    }

    // UI wiring
    mode.addEventListener('change', ()=>{
      if(mode.value==='base') baseOptions.style.display='block';
      else baseOptions.style.display='none';
      // adjust placeholder
      if(mode.value==='text-to-cp') inputValue.placeholder = 'Type text here — e.g. අපි සල';
      else if(mode.value==='cp-to-text') inputValue.placeholder = 'Enter code points — e.g. 0DB1 0DC0 or U+0DB1,U+0DC0';
      else inputValue.placeholder = 'e.g. 1010  or  255  or  0x1F';
      output.textContent = 'ඔබගේ ප්‍රතිඵල මෙහි පෙන්වනු ඇත.';
    });

    convertBtn.addEventListener('click', runConversion);
    inputValue.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); runConversion(); } });
    clearBtn.addEventListener('click', ()=>{ inputValue.value=''; output.textContent=''; });
    copyOut.addEventListener('click', ()=>{
      navigator.clipboard?.writeText(output.textContent).then(()=>{
        // small UI feedback
        const old = copyOut.textContent; copyOut.textContent='Copied'; setTimeout(()=>copyOut.textContent=old,900);
      }).catch(()=>alert('Clipboard not available'));
    });

    // initialize
    mode.dispatchEvent(new Event('change'));
  </script>

</body>
</html>
